- name: Install MySQL 
  apt:
    name: mysql-server
    state: present
    update_cache: yes
  become: true


- name: Run MySQL
  service:
    name: mysql
    state: started
    enabled: yes
  become: true


- name: Install MySQL Python library
  apt:
    name: python3-pymysql
    state: present
    update_cache: yes
  become: true


- name: Create MySQL database
  mysql_db:
    name: crud_db
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  become: true


- name: Create MySQL user
  mysql_user:
    name: "{{ db_user }}"
    password: "{{ vault_db_password }}"
    priv: 'crud_db.*:ALL'
    host: localhost
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  become: true
